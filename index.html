<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yanfeng Lin | University of Macau</title>
    <style>
        :root {
            --british-red: #8B0000;    /* 鲜明的英国红 Dark Red */
            --tsinghua-purple: #660874; /* 标准清华紫 */
            --oxford-blue: #002147;     /* 牛津蓝（用于文字和强调） */
            --soft-bg: #F5F7FA;
        }

        body {
            font-family: 'Garamond', 'Hoefler Text', 'Palatino', serif;
            background-color: var(--oxford-blue); /* 背后底色用蓝 */
            color: #333;
            margin: 0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1050px;
            margin: 0 auto;
            background: white;
            display: grid;
            grid-template-columns: 320px 1fr;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
            border-radius: 4px;
            overflow: hidden;
        }

        /* 侧边栏：大面积使用“英国红” */
        .sidebar {
            background-color: var(--british-red);
            color: white;
            padding: 50px 30px;
            text-align: center;
        }

        .sidebar img {
            width: 160px;
            height: 160px;
            border-radius: 4px; /* 复古方形照片 */
            border: 4px solid white;
            margin-bottom: 20px;
            object-fit: cover;
        }

        .sidebar h1 { font-size: 2.2em; margin: 10px 0; letter-spacing: 1px; }
        .sidebar p { color: #FFD700; font-style: italic; margin: 5px 0; } /* 金色副标题 */

        .sidebar-section { margin-top: 40px; text-align: left; }
        .sidebar-section h3 { 
            border-bottom: 2px solid white; 
            padding-bottom: 5px; 
            font-size: 1.1em;
            color: white;
            text-transform: uppercase;
        }

        .skill-tag {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            padding: 4px 10px;
            margin: 3px;
            border: 1px solid white;
            font-size: 0.85em;
            color: white;
        }

        /* 主内容：强调“清华紫” */
        .main-content { padding: 50px 60px; background: #FFF; }
        
        /* 标题全部使用清华紫 */
        h2 { 
            color: var(--tsinghua-purple); 
            border-bottom: 3px solid var(--tsinghua-purple); 
            padding-bottom: 5px;
            font-size: 1.8em;
            margin-bottom: 30px;
        }

        .card {
            background: #F9F9FB;
            padding: 25px;
            margin-bottom: 25px;
            border-left: 6px solid var(--tsinghua-purple); /* 紫色侧边条 */
            box-shadow: 3px 3px 10px rgba(0,0,0,0.05);
        }

        .card h4 { color: var(--oxford-blue); margin: 0 0 10px 0; font-size: 1.3em; }

        .quote-block {
            background: #F4E8F7; /* 极浅的紫色底 */
            border-right: 8px solid var(--british-red); /* 红色结尾装饰 */
            padding: 30px;
            margin-top: 40px;
            color: var(--tsinghua-purple);
            font-style: italic;
        }

        .footer-note {
            text-align: center;
